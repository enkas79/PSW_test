name: Build PSW_test Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Installazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installazione Librerie
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 pyinstaller

    - name: Creazione EXE con PyInstaller
      run: |
        # Generiamo l'eseguibile basato su PSW_test.py
        # --onefile: crea un unico file .exe
        # --noconsole: nasconde il terminale all'avvio dell'interfaccia grafica
        pyinstaller --onefile --noconsole --name=PSW_test PSW_test.py

    - name: Archiviazione Risultato
      uses: actions/upload-artifact@v4
      with:
        name: PSW_test-Windows-Binary
        path: dist/PSW_test.exe
